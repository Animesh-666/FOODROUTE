<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Smart Food Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Leaflet CSS for map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="checkout-page">

    <nav class="navbar navbar-expand-lg fixed-top glass-navbar" id="main-nav">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <h3 class="brand-logo gradient-text m-0"><i class="fa-solid fa-burger me-2"></i>FoodRoute</h3>
            </a>
            <div class="d-flex align-items-center" id="nav-auth-section">
                <!-- Auth injected by app.js -->
            </div>
        </div>
    </nav>

    <main class="container py-5 mt-5">
        <div class="mb-4">
            <a href="cart.html" class="text-decoration-none text-muted"><i class="fa-solid fa-arrow-left me-2"></i> Back to Cart</a>
        </div>
        
        <h2 class="fw-bold mb-4">Checkout</h2>
        
        <form id="checkoutForm" class="needs-validation" novalidate>
            <div class="row g-4">
                <div class="col-lg-8">
                    <!-- Delivery Address Section -->
                    <div class="glass-card p-4 mb-4">
                        <h4 class="mb-4 d-flex align-items-center"><i class="fa-solid fa-location-dot me-3 text-primary"></i> Delivery Details</h4>
                        
                        <div class="form-floating mb-4">
                            <textarea class="form-control" id="deliveryAddress" placeholder="Address" style="height: 100px" required></textarea>
                            <label for="deliveryAddress">Full Delivery Address</label>
                            <div class="invalid-feedback">Please provide your delivery address.</div>
                        </div>
                        
                        <!-- Map Location Picker -->
                        <div class="mb-3">
                            <label class="form-label text-muted d-flex justify-content-between">
                                <span><i class="fa-solid fa-map-location-dot me-2"></i> Pin Location (Optional but recommended)</span>
                                <button type="button" class="btn btn-sm btn-outline-primary" id="btnGetCurrentLocation">
                                    <i class="fa-solid fa-crosshairs"></i> Get Current Location
                                </button>
                            </label>
                            <div id="mapPicker" class="rounded border border-secondary" style="height: 250px; background: var(--glass-bg);"></div>
                            <input type="hidden" id="lat">
                            <input type="hidden" id="lng">
                            <small class="text-muted mt-2 d-block">Click on the map to set your exact delivery location.</small>
                        </div>
                    </div>
                    
                    <!-- Payment Section -->
                    <div class="glass-card p-4 mb-4">
                        <h4 class="mb-4 d-flex align-items-center"><i class="fa-solid fa-credit-card me-3 text-success"></i> Payment Method</h4>
                        
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="payment-method-card w-100 h-100 p-3 border rounded text-center cursor-pointer" for="payCod">
                                    <input type="radio" name="payment_method" id="payCod" value="cod" class="d-none" checked>
                                    <i class="fa-solid fa-wallet fa-2x mb-2 text-warning"></i>
                                    <h6 class="m-0">Cash on Delivery</h6>
                                </label>
                            </div>
                            <div class="col-md-6">
                                <label class="payment-method-card w-100 h-100 p-3 border rounded text-center cursor-pointer opacity-50" for="payCard">
                                    <input type="radio" name="payment_method" id="payCard" value="card" class="d-none" disabled>
                                    <i class="fa-solid fa-credit-card fa-2x mb-2 text-primary"></i>
                                    <h6 class="m-0">Card / UPI</h6>
                                    <span class="badge bg-secondary mt-2">Coming Soon</span>
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Additional Notes -->
                    <div class="glass-card p-4">
                        <h4 class="mb-4 d-flex align-items-center"><i class="fa-regular fa-comment-dots me-3 text-info"></i> Additional Notes</h4>
                        <div class="form-floating">
                            <textarea class="form-control" id="orderNotes" placeholder="Notes" style="height: 100px"></textarea>
                            <label for="orderNotes">Any special instructions for the delivery agent? (Optional)</label>
                        </div>
                    </div>
                </div>
                
                <!-- Order Summary -->
                <div class="col-lg-4">
                    <div class="glass-card p-4 sticky-top" style="top: 100px;">
                        <h4 class="mb-4">Order Summary</h4>
                        
                        <div id="checkoutItemsList" class="mb-4 pb-3 border-bottom border-secondary max-h-300 overflow-auto">
                            <!-- Items injected via JS -->
                        </div>
                        
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Subtotal</span>
                            <span class="fw-medium" id="checkoutSubtotal">₹0.00</span>
                        </div>
                        
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Delivery Fee</span>
                            <span class="fw-medium" id="checkoutDelivery">₹40.00</span>
                        </div>
                        
                        <div class="d-flex justify-content-between mb-4 pb-4 border-bottom border-secondary">
                            <span class="text-muted">Taxes (5%)</span>
                            <span class="fw-medium" id="checkoutTax">₹0.00</span>
                        </div>
                        
                        <div class="d-flex justify-content-between mb-4">
                            <span class="h4 m-0">Total to Pay</span>
                            <span class="h4 m-0 text-success-gradient fw-bold" id="checkoutTotal">₹0.00</span>
                        </div>
                        
                        <button type="submit" class="btn btn-success-gradient w-100 py-3 fw-bold fs-5" id="btnPlaceOrder">
                            Place Order
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/order.js"></script>
    
    <style>
        .payment-method-card { transition: all 0.2s; border-color: var(--clr-border) !important; background: var(--clr-surface); color: var(--clr-text-primary); }
        input[type="radio"]:checked + .payment-method-card, .payment-method-card:has(input[type="radio"]:checked) {
            border-color: var(--clr-success) !important;
            background: rgba(16, 185, 129, 0.1);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }
        .max-h-300 { max-height: 300px; }
    </style>
</body>
</html>
