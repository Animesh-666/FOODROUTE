<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="p-3 mb-4 d-flex align-items-center justify-content-between">
                <a href="../index.html" class="text-decoration-none">
                    <h4 class="brand-logo gradient-text m-0"><i class="fa-solid fa-burger me-2"></i>Admin</h4>
                </a>
                <button class="btn btn-link text-light d-lg-none p-0" id="closeSidebarBtn">
                    <i class="fa-solid fa-xmark fa-lg"></i>
                </button>
            </div>
            
            <ul class="nav flex-column mb-auto">
                <li class="nav-item"><a href="admin-dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> Dashboard</a></li>
                <li class="nav-item"><a href="admin-orders.html" class="nav-link"><i class="fa-solid fa-clipboard-list"></i> Orders</a></li>
                <li class="nav-item"><a href="admin-menu.html" class="nav-link"><i class="fa-solid fa-utensils"></i> Menu Items</a></li>
                <li class="nav-item"><a href="admin-users.html" class="nav-link"><i class="fa-solid fa-users"></i> Customers</a></li>
                <li class="nav-item"><a href="admin-agents.html" class="nav-link"><i class="fa-solid fa-motorcycle"></i> Delivery Agents</a></li>
                <li class="nav-item"><a href="admin-analytics.html" class="nav-link active"><i class="fa-solid fa-chart-line"></i> Analytics</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center">
                    <button class="btn btn-dark border-secondary me-3 d-lg-none" id="toggleSidebarBtn">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h2 class="m-0 fw-bold">Analytics & Reports</h2>
                </div>
                <button class="btn btn-outline-light border-secondary btn-sm" onclick="loadAnalyticsData()">
                    <i class="fa-solid fa-arrows-rotate me-1"></i> Refresh
                </button>
            </div>

            <!-- Summary Cards -->
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="glass-card p-4 d-flex align-items-center justify-content-between">
                        <div>
                            <span class="text-muted small d-block mb-1">Total Revenue</span>
                            <h3 class="m-0 fw-bold text-success-gradient" id="statRevenue">₹0.00</h3>
                        </div>
                        <div class="stat-icon bg-success-subtle text-success p-3 rounded-3" style="width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;">
                            <i class="fa-solid fa-indian-rupee-sign fa-lg"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="glass-card p-4 d-flex align-items-center justify-content-between">
                        <div>
                            <span class="text-muted small d-block mb-1">Total Orders</span>
                            <h3 class="m-0 fw-bold text-primary-gradient" id="statOrders">0</h3>
                        </div>
                        <div class="stat-icon bg-primary-subtle text-primary p-3 rounded-3" style="width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;">
                            <i class="fa-solid fa-clipboard-list fa-lg"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="glass-card p-4 d-flex align-items-center justify-content-between">
                        <div>
                            <span class="text-muted small d-block mb-1">Total Customers</span>
                            <h3 class="m-0 fw-bold text-info-gradient" id="statCustomers">0</h3>
                        </div>
                        <div class="stat-icon bg-info-subtle text-info p-3 rounded-3" style="width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;">
                            <i class="fa-solid fa-users fa-lg"></i>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="glass-card p-4 d-flex align-items-center justify-content-between">
                        <div>
                            <span class="text-muted small d-block mb-1">Avg Order Value</span>
                            <h3 class="m-0 fw-bold text-warning-gradient" id="statAvgValue">₹0.00</h3>
                        </div>
                        <div class="stat-icon bg-warning-subtle text-warning p-3 rounded-3" style="width: 54px; height: 54px; display: flex; align-items: center; justify-content: center;">
                            <i class="fa-solid fa-chart-line fa-lg"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts Section -->
            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="glass-card p-4">
                        <h5 class="mb-4 fw-semibold"><i class="fa-solid fa-chart-area me-2 text-primary"></i>Revenue Trend (Last 7 Days)</h5>
                        <div class="chart-container" style="position: relative; height: 350px;">
                            <canvas id="revenueChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="glass-card p-4">
                        <h5 class="mb-4 fw-semibold"><i class="fa-solid fa-chart-bar me-2 text-info"></i>Orders Volume (Last 7 Days)</h5>
                        <div class="chart-container" style="position: relative; height: 350px;">
                            <canvas id="ordersChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
