<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard - Smart Food Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/delivery.css">
</head>
<body class="delivery-app">

    <!-- Navbar -->
    <nav class="navbar navbar-delivery sticky-top">
        <div class="container-fluid px-3">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="fa-solid fa-motorcycle text-primary me-2 fa-lg"></i>
                <span class="fw-bold fs-5">Agent Portal</span>
            </a>
            
            <div class="d-flex align-items-center gap-3">
                <div class="form-check form-switch d-flex align-items-center gap-2 m-0">
                    <label class="form-check-label text-muted small fw-bold" for="agentStatusToggle" id="agentStatusLabel">Offline</label>
                    <input class="form-check-input fs-5 m-0" type="checkbox" role="switch" id="agentStatusToggle">
                </div>
                <button class="btn btn-outline-danger btn-sm" onclick="Auth.logout()">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container-fluid p-3 pb-5">
        
        <!-- Welcome & Stats -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h5 class="m-0 fw-bold">Hello, <span id="agentName" class="text-primary">Agent</span>!</h5>
                <small class="text-muted"><i class="fa-solid fa-star text-warning"></i> <span id="agentRating">5.0</span> Rating</small>
            </div>
            <div class="text-end">
                <h6 class="m-0 text-success" id="todayEarnings">₹0</h6>
                <small class="text-muted">Today's Earnings</small>
            </div>
        </div>
        
        <!-- Active Deliveries List -->
        <h6 class="fw-bold text-uppercase text-muted mb-3 d-flex justify-content-between align-items-center">
            <span>Current Route (<span id="activeCount">0</span>)</span>
            <button class="btn btn-sm btn-link text-primary p-0 text-decoration-none" onclick="loadDeliveryDashboard()">
                <i class="fa-solid fa-rotate-right"></i> Refresh
            </button>
        </h6>
        
        <div id="activeOrdersList" class="d-flex flex-column gap-3 mb-4">
            <!-- Active orders injected here -->
            <div class="text-center py-5 glass-card rounded">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Loading route...</p>
            </div>
        </div>
        
        <!-- GPS Tracker Box -->
        <div class="glass-card p-3 rounded mb-4" id="gpsStatusCard">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <div class="bg-secondary bg-opacity-25 p-2 rounded text-secondary" id="gpsIconWrapper">
                        <i class="fa-solid fa-location-dot fa-lg"></i>
                    </div>
                    <div>
                        <h6 class="m-0" id="gpsStatusText">Location tracking off</h6>
                        <small class="text-muted" id="gpsLastUpdate">Go online to start tracking</small>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Map Modal for Navigation -->
    <div class="modal fade custom-modal" id="navigationModal" tabindex="-1">
        <div class="modal-dialog modal-fullscreen modal-dialog-scrollable">
            <div class="modal-content modal-themed">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title fs-6">
                        <i class="fa-solid fa-location-arrow text-primary me-2"></i> Navigating to Order <span id="navOrderId" class="text-white"></span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0 position-relative">
                    <div id="agentMap" class="w-100 h-100 bg-secondary bg-opacity-10"></div>
                    
                    <!-- Floating info panel over map -->
                    <div class="position-absolute bottom-0 start-0 w-100 p-3 z-3" style="background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);">
                        <div class="glass-card p-3 rounded">
                            <h6 class="fw-bold mb-1" id="navCustomerName">Customer Name</h6>
                            <p class="text-muted small mb-3 line-clamp-2" id="navAddress">Address here...</p>
                            
                            <div class="d-flex gap-2">
                                <a href="#" class="btn btn-outline-info flex-grow-1" id="btnCallCustomer">
                                    <i class="fa-solid fa-phone me-2"></i> Call
                                </a>
                                <button class="btn btn-success-gradient flex-grow-1 fw-bold" id="btnMarkDelivered">
                                    <i class="fa-solid fa-check me-2"></i> Delivered
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/delivery.js"></script>
</body>
</html>
