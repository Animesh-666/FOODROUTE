<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Smart Food Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page">
    
    <div class="auth-split-layout">
        <div class="auth-brand-side" style="background: linear-gradient(135deg, rgba(14, 165, 233, 0.9), rgba(15, 52, 96, 0.95)), url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;">
            <div class="auth-brand-content">
                <a href="../index.html" class="text-decoration-none">
                    <h2 class="text-white mb-5"><i class="fa-solid fa-burger me-2 text-info"></i>FoodRoute <span class="badge bg-info ms-2 fs-6">Admin</span></h2>
                </a>
                <h1>Command Center.</h1>
                <p class="fs-5 text-light opacity-75">Manage orders, optimize DAA routing, and oversee the entire delivery network.</p>
            </div>
        </div>

        <div class="auth-form-side">
            <div class="auth-form-wrapper">
                <div class="mobile-brand">
                    <h2 class="brand-logo text-info m-0"><i class="fa-solid fa-burger me-2"></i>Admin</h2>
                </div>

                <h3 class="auth-title">Admin Log In</h3>
                <p class="auth-subtitle">Restricted Access.</p>

                <form id="adminLoginForm" class="needs-validation" novalidate>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required autocomplete="email">
                        <label for="email"><i class="fa-regular fa-envelope me-2"></i>Admin Email</label>
                    </div>

                    <div class="form-floating mb-4 position-relative">
                        <input type="password" class="form-control" id="password" placeholder="Password" required autocomplete="current-password">
                        <label for="password"><i class="fa-solid fa-lock me-2"></i>Password</label>
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>

                    <button type="submit" class="btn btn-info w-100 mb-3 fw-bold py-2 text-white" id="loginBtn" style="background: linear-gradient(135deg, #0ea5e9 0%, #3b82f6 100%); border: none;">
                        Access Dashboard <i class="fa-solid fa-shield-halved ms-2"></i>
                    </button>

                    <div class="auth-disclaimer">
                        <p><i class="fa-solid fa-circle-info me-2"></i><strong>Security Notice:</strong> All admin actions are logged. Unauthorized access attempts will be reported.</p>
                    </div>
                    
                    <div class="text-center mt-3">
                        <p class="small text-muted mb-3">Need admin privileges? <a href="admin-signup.html" class="text-info text-decoration-none fw-semibold">Register Admin</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
