<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - Smart Food Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-page">

    <nav class="navbar navbar-expand-lg fixed-top glass-navbar" id="main-nav">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <h3 class="brand-logo gradient-text m-0"><i class="fa-solid fa-burger me-2"></i>FoodRoute</h3>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="customer-dashboard.html">Dashboard</a></li>
                </ul>
                <div class="d-flex align-items-center" id="nav-auth-section">
                    <!-- Auth injected by app.js -->
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-5 mt-5">
        <div class="mb-4">
            <a href="customer-dashboard.html" class="text-decoration-none text-muted"><i class="fa-solid fa-arrow-left me-2"></i> Back to Dashboard</a>
        </div>
        
        <h2 class="fw-bold mb-4">My Orders</h2>
        
        <div class="glass-card p-0 overflow-hidden mb-4">
            <div class="table-responsive">
                <table class="table table-hover mb-0 custom-table align-middle">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Items Summary</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="ordersHistoryList">
                        <tr><td colspan="6" class="text-center py-5">Loading orders...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Pagination -->
        <nav aria-label="Orders pagination">
            <ul class="pagination justify-content-center" id="pagination">
                <!-- Pagination injected here -->
            </ul>
        </nav>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/customer.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof loadOrderHistory === 'function') {
                loadOrderHistory();
            }
        });
    </script>
</body>
</html>
