<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Smart Food Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-page">

    <nav class="navbar navbar-expand-lg fixed-top glass-navbar" id="main-nav">
        <!-- ... navbar content ... -->
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <h3 class="brand-logo gradient-text m-0"><i class="fa-solid fa-burger me-2"></i>FoodRoute</h3>
            </a>
            <div class="d-flex align-items-center" id="nav-auth-section"></div>
        </div>
    </nav>

    <main class="container py-5 mt-5">
        <div class="mb-4">
            <a href="customer-dashboard.html" id="backToDashboardBtn" class="text-decoration-none text-muted"><i class="fa-solid fa-arrow-left me-2"></i> Back to Dashboard</a>
        </div>
        
        <h2 class="fw-bold mb-4">Profile Settings</h2>
        
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass-card p-4 text-center">
                    <div class="profile-avatar bg-primary-gradient text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 100px; height: 100px; font-size: 2.5rem;" id="avatarInitial">
                        U
                    </div>
                    <h4 id="profileNameDisplay">Loading...</h4>
                    <p class="text-muted mb-4" id="profileEmailDisplay">...</p>
                    
                    <button class="btn btn-outline-danger w-100" onclick="Auth.logout()">
                        <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
                    </button>
                </div>
            </div>
            
            <div class="col-lg-8">
                <div class="glass-card p-4">
                    <h5 class="mb-4">Personal Information</h5>
                    
                    <form id="profileForm" class="needs-validation" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="profileName" placeholder="Name" required>
                                    <label for="profileName">Full Name</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="email" class="form-control" id="profileEmail" placeholder="Email" disabled>
                                    <label for="profileEmail">Email Address (Cannot be changed)</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="tel" class="form-control" id="profilePhone" placeholder="Phone" pattern="[0-9]{10}">
                                    <label for="profilePhone">Phone Number</label>
                                    <div class="invalid-feedback">Enter a 10-digit number.</div>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-floating">
                                    <textarea class="form-control" id="profileAddress" placeholder="Address" style="height: 100px"></textarea>
                                    <label for="profileAddress">Default Delivery Address</label>
                                </div>
                            </div>
                            
                            <div class="col-12 mt-4 text-end">
                                <button type="submit" class="btn btn-primary-gradient px-4" id="btnUpdateProfile">
                                    Save Changes
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/customer.js"></script>
</body>
</html>
