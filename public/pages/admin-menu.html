<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Menu - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="p-3 mb-4 d-flex align-items-center justify-content-between">
                <a href="../index.html" class="text-decoration-none">
                    <h4 class="brand-logo gradient-text m-0"><i class="fa-solid fa-burger me-2"></i>Admin</h4>
                </a>
                <button class="btn btn-link text-light d-lg-none p-0" id="closeSidebarBtn">
                    <i class="fa-solid fa-xmark fa-lg"></i>
                </button>
            </div>
            
            <ul class="nav flex-column mb-auto">
                <li class="nav-item"><a href="admin-dashboard.html" class="nav-link"><i class="fa-solid fa-gauge-high"></i> Dashboard</a></li>
                <li class="nav-item"><a href="admin-orders.html" class="nav-link"><i class="fa-solid fa-clipboard-list"></i> Orders</a></li>
                <li class="nav-item"><a href="admin-menu.html" class="nav-link active"><i class="fa-solid fa-utensils"></i> Menu Items</a></li>
                <li class="nav-item"><a href="admin-users.html" class="nav-link"><i class="fa-solid fa-users"></i> Customers</a></li>
                <li class="nav-item"><a href="admin-agents.html" class="nav-link"><i class="fa-solid fa-motorcycle"></i> Delivery Agents</a></li>
                <li class="nav-item"><a href="admin-analytics.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> Analytics</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center">
                    <button class="btn btn-dark border-secondary me-3 d-lg-none" id="toggleSidebarBtn">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h2 class="m-0 fw-bold">Manage Menu</h2>
                </div>
                <button class="btn btn-primary-gradient" onclick="openFoodModal()">
                    <i class="fa-solid fa-plus me-2"></i> Add Item
                </button>
            </div>

            <div class="glass-card p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle custom-table mb-0">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="adminMenuList">
                            <tr><td colspan="7" class="text-center py-4">Loading menu...</td></tr>
                        </tbody>
                    </table>
                </div>

                <nav class="mt-4">
                    <ul class="pagination justify-content-center" id="menuPagination"></ul>
                </nav>
            </div>
        </main>
    </div>

    <!-- Food Item Modal (Add/Edit) -->
    <div class="modal fade custom-modal" id="foodModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content modal-themed">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="foodModalTitle">Add Food Item</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="foodForm" class="needs-validation" novalidate>
                        <input type="hidden" id="foodId">
                        
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Item Name</label>
                                <input type="text" class="form-control form-input-themed" id="foodName" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                <input type="text" class="form-control form-input-themed" id="foodCategory" required list="categoryList">
                                <datalist id="categoryList">
                                    <!-- Populated dynamically -->
                                </datalist>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label">Price (₹)</label>
                                <input type="number" step="0.01" class="form-control form-input-themed" id="foodPrice" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label">Prep Time (mins)</label>
                                <input type="number" class="form-control form-input-themed" id="foodPrepTime" value="15" required>
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label">Image URL</label>
                                <input type="url" class="form-control form-input-themed" id="foodImage">
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea class="form-control form-input-themed" id="foodDesc" rows="3"></textarea>
                            </div>
                            
                            <div class="col-md-6">
                                <div class="form-check form-switch mt-3">
                                    <input class="form-check-input" type="checkbox" id="foodIsVeg" checked>
                                    <label class="form-check-label" for="foodIsVeg">Pure Veg</label>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <div class="form-check form-switch mt-3">
                                    <input class="form-check-input" type="checkbox" id="foodIsAvailable" checked>
                                    <label class="form-check-label" for="foodIsAvailable">Currently Available</label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-4 text-end">
                            <button type="button" class="btn btn-outline-light me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary-gradient" id="saveFoodBtn">Save Item</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
